<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Cliente - A/A</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #0061ff 0%, #60efff 100%);
            --success-grad: linear-gradient(135deg, #28a745 0%, #a5d6a7 100%);
            --glass: rgba(255, 255, 255, 0.9);
        }

        body { 
            background: #eef2f7; 
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            color: #2d3436;
        }

        .main-container { max-width: 900px; margin-top: 30px; }

        /* Estilo de Tarjetas */
        .card { 
            border: none; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            background: var(--glass);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
            overflow: hidden;
        }

        .header-blue { background: var(--primary-grad); color: white; border: none; }
        .header-green { background: var(--success-grad); color: white; border: none; }

        .card-header h5 {
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Estilo de Inputs */
        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            background: #fdfdfd;
            transition: all 0.3s border-color ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: #0061ff;
            box-shadow: 0 0 0 4px rgba(0, 97, 255, 0.1);
            background: #fff;
        }

        label {
            margin-bottom: 6px;
            color: #4a4a4a;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Botones Animados */
        .btn-save {
            background: var(--success-grad);
            border: none;
            color: white;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.3);
            filter: brightness(1.1);
        }

        .btn-return {
            border-radius: 15px;
            padding: 15px;
            border: 2px solid #6c757d;
            font-weight: 600;
        }

        .logo-img {
            height: 90px;
            width: 90px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .section-icon {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container main-container py-4">
        <div class="text-center mb-5">
            <img src="Logo.png" alt="Logo" class="logo-img mb-3">
            <h2 class="fw-bold" style="background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                REGISTRO DE NUEVO CLIENTE
            </h2>
            <p class="text-muted">Complete la información detallada para el control de mantenimiento</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-12">
                <div class="card mb-4">
                    <div class="card-header header-blue py-3">
                        <h5 class="mb-0"><i class="bi bi-person-vcard section-icon"></i> 1. DATOS DEL CLIENTE</h5>
                    </div>
                    <div class="card-body p-4 row g-3">
                        <div class="col-md-6">
                            <label class="fw-bold">Nombre Completo</label>
                            <input type="text" id="cName" class="form-control shadow-sm" placeholder="Ej: Juan Perez">
                        </div>
                        <div class="col-md-6">
                            <label class="fw-bold">DNI / RUC</label>
                            <input type="text" id="cDni" class="form-control shadow-sm" placeholder="Número de documento">
                        </div>
                        <div class="col-md-6">
                            <label class="fw-bold">Teléfono</label>
                            <input type="tel" id="cPhone" class="form-control shadow-sm" placeholder="987654321">
                        </div>
                        <div class="col-md-6">
                            <label class="fw-bold">Distrito</label>
                            <input type="text" id="cDistrict" class="form-control shadow-sm" placeholder="Ej: Rimac">
                        </div>
                        <div class="col-12">
                            <label class="fw-bold">Dirección Exacta</label>
                            <input type="text" id="cAddress" class="form-control shadow-sm" placeholder="Calle, Avenida, Mz, Lote...">
                        </div>
                        <div class="col-12">
                            <label class="fw-bold">Enlace Google Maps (Opcional)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="bi bi-geo-alt text-danger"></i></span>
                                <input type="text" id="cMaps" class="form-control border-start-0 shadow-sm" placeholder="Pegue el enlace aquí">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header header-green py-3">
                        <h5 class="mb-0"><i class="bi bi-snow section-icon"></i> 2. DETALLES DEL EQUIPO</h5>
                    </div>
                    <div class="card-body p-4 row g-3">
                        <div class="col-md-4">
                            <label class="fw-bold">Marca</label>
                            <select id="eBrand" class="form-select shadow-sm">
                                <option>Mabe</option><option>LG</option><option>Samsung</option>
                                <option>York</option><option>Midea</option><option>Carrier</option>
                                <option>Miray</option><option>Panasonic</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="fw-bold">Capacidad</label>
                            <select id="eBtu" class="form-select shadow-sm">
                                <option>9k BTU</option><option selected>12k BTU</option>
                                <option>18k BTU</option><option>24k BTU</option>
                                <option>36k BTU</option><option>48k BTU</option><option>60k BTU</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="fw-bold">Tipo de Gas</label>
                            <select id="eGas" class="form-select shadow-sm">
                                <option selected>R410A</option><option>R22</option><option>R32</option><option>R134a</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="fw-bold text-primary">Fecha de Último Mantenimiento</label>
                            <input type="date" id="eDate" class="form-control shadow-sm border-primary">
                        </div>
                        <div class="col-12">
                            <label class="fw-bold">Observaciones del Técnico</label>
                            <textarea id="eObs" class="form-control shadow-sm" rows="3" placeholder="Describa el estado actual del equipo..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-5">
                    <div class="col-md-8">
                        <button id="btnSave" class="btn btn-save w-100 fw-bold shadow">
                            <i class="bi bi-cloud-upload me-2"></i> FINALIZAR Y GUARDAR REGISTRO
                        </button>
                    </div>
                    <div class="col-md-4">
                        <a href="dashboard.html" class="btn btn-outline-secondary btn-return w-100">
                            <i class="bi bi-arrow-left me-1"></i> CANCELAR
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtfZP6tlFJ-Uh4KZfsl_S8ItINDub1Jo",
            authDomain: "aa-control-mantenimiento.firebaseapp.com",
            projectId: "aa-control-mantenimiento",
            storageBucket: "aa-control-mantenimiento.firebasestorage.app",
            messagingSenderId: "415608064599",
            appId: "1:415608064599:web:1acf1db2ff02424f847112"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('btnSave').onclick = () => {
            const name = document.getElementById('cName').value;
            const date = document.getElementById('eDate').value;

            if(!name || !date) {
                return Swal.fire({
                    title: 'Atención',
                    text: 'El nombre y la fecha son obligatorios para el seguimiento.',
                    icon: 'warning',
                    confirmButtonColor: '#0061ff'
                });
            }

            const clientsRef = ref(db, 'clientes');
            const newClientRef = push(clientsRef);
            
            set(newClientRef, {
                client: {
                    name: name,
                    dni: document.getElementById('cDni').value || "S/D",
                    phone: document.getElementById('cPhone').value || "S/T",
                    district: document.getElementById('cDistrict').value || "---",
                    address: document.getElementById('cAddress').value || "---",
                    maps: document.getElementById('cMaps').value || "#"
                },
                equipment: {
                    brand: document.getElementById('eBrand').value,
                    btu: document.getElementById('eBtu').value,
                    gas: document.getElementById('eGas').value,
                    date: date,
                    obs: document.getElementById('eObs').value || ""
                }
            }).then(() => {
                Swal.fire({
                    icon: 'success',
                    title: '¡Registro Exitoso!',
                    text: 'El cliente ha sido agregado a la base de datos.',
                    showConfirmButton: false,
                    timer: 2000
                }).then(() => window.location.href = "dashboard.html");
            }).catch(e => Swal.fire('Error', 'No se pudo guardar: ' + e.message, 'error'));
        };
    </script>
</body>
</html>
