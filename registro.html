<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Registro - A/A</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f0f2f5; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-blue { background: #007bff; color: white; border-radius: 12px 12px 0 0; }
        .header-green { background: #28a745; color: white; border-radius: 12px 12px 0 0; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header header-blue py-3"><h5 class="mb-0">1. Datos del Cliente</h5></div>
                    <div class="card-body p-4 row g-3">
                        <div class="col-md-6"><label class="small fw-bold">Nombre</label><input type="text" id="cName" class="form-control"></div>
                        <div class="col-md-6"><label class="small fw-bold">DNI / RUC</label><input type="text" id="cDni" class="form-control"></div>
                        <div class="col-md-6"><label class="small fw-bold">Teléfono</label><input type="tel" id="cPhone" class="form-control"></div>
                        <div class="col-md-6"><label class="small fw-bold">Distrito</label><input type="text" id="cDistrict" class="form-control"></div>
                        <div class="col-12"><label class="small fw-bold">Dirección</label><input type="text" id="cAddress" class="form-control"></div>
                        <div class="col-12"><label class="small fw-bold">Link Google Maps</label><input type="text" id="cMaps" class="form-control"></div>
                    </div>
                </div>
                <div class="card mb-4">
                    <div class="card-header header-green py-3"><h5 class="mb-0">2. Detalles del Equipo</h5></div>
                    <div class="card-body p-4 row g-3">
                        <div class="col-md-4">
                            <label class="small fw-bold">Marca</label>
                            <select id="eBrand" class="form-select">
                                <option>Mabe</option><option>LG</option><option>Samsung</option><option>York</option><option>Midea</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="small fw-bold">Capacidad</label>
                            <select id="eBtu" class="form-select">
                                <option>9k</option><option selected>12k</option><option>18k</option><option>24k</option><option>36k</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="small fw-bold">Gas</label>
                            <select id="eGas" class="form-select">
                                <option selected>R410A</option><option>R22</option><option>R32</option>
                            </select>
                        </div>
                        <div class="col-md-6"><label class="small fw-bold">Fecha Instalación</label><input type="date" id="eDate" class="form-control"></div>
                        <div class="col-12"><label class="small fw-bold">Observaciones</label><textarea id="eObs" class="form-control" rows="2"></textarea></div>
                    </div>
                </div>
                <button id="btnSave" class="btn btn-success btn-lg w-100 fw-bold">GUARDAR REGISTRO</button>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBHtfZP6tlFJ-Uh4KZfsl_S8ItINDub1Jo",
            authDomain: "aa-control-mantenimiento.firebaseapp.com",
            projectId: "aa-control-mantenimiento",
            storageBucket: "aa-control-mantenimiento.firebasestorage.app",
            messagingSenderId: "415608064599",
            appId: "1:415608064599:web:1acf1db2ff02424f847112"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        document.getElementById('btnSave').onclick = () => {
            const name = document.getElementById('cName').value;
            if(!name || !document.getElementById('eDate').value) return Swal.fire('Error', 'Completa los campos', 'error');
            const newRef = push(ref(db, 'clientes'));
            set(newRef, {
                client: { name, dni: document.getElementById('cDni').value, phone: document.getElementById('cPhone').value, district: document.getElementById('cDistrict').value, address: document.getElementById('cAddress').value, maps: document.getElementById('cMaps').value || "#" },
                equipment: { brand: document.getElementById('eBrand').value, btu: document.getElementById('eBtu').value, gas: document.getElementById('eGas').value, date: document.getElementById('eDate').value, obs: document.getElementById('eObs').value }
            }).then(() => { Swal.fire('Éxito', 'Guardado', 'success').then(() => window.location.href="dashboard.html"); });
        };
    </script>
</body>
</html>
