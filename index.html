<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema A/A</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { 
            background: linear-gradient(rgba(0, 123, 255, 0.7), rgba(40, 167, 69, 0.7)), 
                        url('Logo.png') no-repeat center center fixed;
            background-size: cover; height: 100vh; display: flex; align-items: center; 
        }
        .login-card { border: none; border-radius: 20px; background: rgba(255, 255, 255, 0.9); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .logo-img { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 3px solid #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card login-card p-4 text-center">
                    <img src="Logo.png" alt="Logo" class="logo-img mx-auto mb-3">
                    <h3 class="text-primary fw-bold">SISTEMA A/A</h3>
                    <div class="mb-3 text-start">
                        <label class="small fw-bold">Correo</label>
                        <input type="email" id="userEmail" class="form-control" placeholder="admin@correo.com">
                    </div>
                    <div class="mb-4 text-start">
                        <label class="small fw-bold">Contraseña</label>
                        <input type="password" id="userPass" class="form-control" placeholder="******">
                    </div>
                    <button id="btnLogin" class="btn btn-success w-100 fw-bold shadow">INICIAR SESIÓN</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBHtfZP6tlFJ-Uh4KZfsl_S8ItINDub1Jo",
            authDomain: "aa-control-mantenimiento.firebaseapp.com",
            projectId: "aa-control-mantenimiento",
            storageBucket: "aa-control-mantenimiento.firebasestorage.app",
            messagingSenderId: "415608064599",
            appId: "1:415608064599:web:1acf1db2ff02424f847112"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        document.getElementById('btnLogin').onclick = async () => {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                sessionStorage.setItem('isLogged', 'true');
                window.location.href = "dashboard.html";
            } catch (e) {
                Swal.fire('Error', 'Credenciales incorrectas', 'error');
            }
        };
    </script>
</body>
</html>
