<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema A/A</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(rgba(0, 123, 255, 0.7), rgba(40, 167, 69, 0.7)), 
                        url('Logo.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh; 
            display: flex; 
            align-items: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card { 
            border: none; 
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .logo-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid #007bff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card login-card p-4 text-center">
                    <img src="Logo.png" alt="Logo" class="logo-img mx-auto">
                    <h3 class="text-primary fw-bold">SISTEMA MANTENIMIENTOS A/A</h3>
                    <p class="text-muted small mb-4">Ingrese sus credenciales</p>
                    
                    <div id="error-msg" class="alert alert-danger d-none py-2">Usuario o clave incorrectos</div>
                    
                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold">Usuario</label>
                        <input type="text" id="user" class="form-control" placeholder="admin">
                    </div>
                    <div class="mb-4 text-start">
                        <label class="form-label small fw-bold">Contraseña</label>
                        <input type="password" id="pass" class="form-control" placeholder="1234">
                    </div>
                    <button onclick="login()" class="btn btn-success w-100 fw-bold py-2 shadow">INICIAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            // Credenciales: admin / 1234
            if(u === "admin" && p === "1234") {
                sessionStorage.setItem('isLogged', 'true');
                window.location.href = "dashboard.html";
            } else {
                document.getElementById('error-msg').classList.remove('d-none');
            }
        }
    </script>
</body>
</html>
