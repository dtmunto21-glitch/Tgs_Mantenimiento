<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - A/A</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .vencido { background-color: #fff5f5 !important; border-left: 6px solid #dc3545; }
        .al-dia { border-left: 6px solid #28a745; }
        .nav-tabs .nav-link.active { background-color: #007bff; color: white; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold">CONTROL TÉCNICO</span>
            <a href="registro.html" class="btn btn-success fw-bold">+ NUEVO</a>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <input type="text" id="searchInput" class="form-control mb-3" placeholder="🔍 Buscar cliente..." onkeyup="filtrar()">
        <div class="card shadow-sm overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Cliente / Dirección</th>
                            <th>DNI</th>
                            <th>Teléfono</th>
                            <th>Equipo</th>
                            <th>Mantenimiento</th>
                            <th>Gestión</th>
                        </tr>
                    </thead>
                    <tbody id="maintTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="hvacModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Expediente Técnico</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul class="nav nav-tabs mb-3">
                        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-hist">Hoja de Vida</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-edit">Editar Cliente</button></li>
                    </ul>
                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="tab-hist">
                            <div class="alert alert-warning py-2 small"><strong>OBS:</strong> <span id="viewObs"></span></div>
                            <div class="bg-light p-2 border rounded mb-2">
                                <div class="row g-2">
                                    <div class="col-4"><input type="date" id="hDate" class="form-control form-control-sm"></div>
                                    <div class="col-8"><input type="text" id="hDesc" class="form-control form-control-sm" placeholder="Detalle..."></div>
                                    <button id="btnAddHist" class="btn btn-success btn-sm w-100 mt-2">Añadir Visita</button>
                                </div>
                            </div>
                            <div id="histList" class="small" style="max-height: 200px; overflow-y: auto;"></div>
                        </div>
                        <div class="tab-pane fade" id="tab-edit">
                            <div class="row g-2">
                                <div class="col-6"><label class="small">Nombre</label><input type="text" id="eName" class="form-control"></div>
                                <div class="col-6"><label class="small">DNI</label><input type="text" id="eDni" class="form-control"></div>
                                <div class="col-6"><label class="small">Teléfono</label><input type="text" id="ePhone" class="form-control"></div>
                                <div class="col-6"><label class="small">Distrito</label><input type="text" id="eDist" class="form-control"></div>
                                <div class="col-12"><label class="small">Dirección</label><input type="text" id="eAddr" class="form-control"></div>
                                <div class="col-12"><label class="small">Maps Link</label><input type="text" id="eMaps" class="form-control"></div>
                                <div class="col-12"><label class="small">Obs. Equipo</label><textarea id="eObsEdit" class="form-control"></textarea></div>
                                <button id="btnUpdate" class="btn btn-primary w-100 mt-3">GUARDAR CAMBIOS</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBHtfZP6tlFJ-Uh4KZfsl_S8ItINDub1Jo",
            authDomain: "aa-control-mantenimiento.firebaseapp.com",
            projectId: "aa-control-mantenimiento",
            storageBucket: "aa-control-mantenimiento.firebasestorage.app",
            messagingSenderId: "415608064599",
            appId: "1:415608064599:web:1acf1db2ff02424f847112"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let curId = null;

        onValue(ref(db, 'clientes'), (snap) => {
            const data = snap.val();
            const tbody = document.getElementById('maintTable');
            tbody.innerHTML = '';
            for(let id in data) {
                const c = data[id].client; const e = data[id].equipment;
                const hist = data[id].history ? Object.values(data[id].history) : [];
                let lastV = hist.length > 0 ? hist[hist.length-1].date : e.date;
                let nextV = new Date(lastV); nextV.setMonth(nextV.getMonth() + 3);
                const isV = nextV < new Date();
                tbody.innerHTML += `<tr class="${isV ? 'vencido' : 'al-dia'} data-row" data-s="${c.name.toLowerCase()}">
                    <td><strong>${c.name}</strong><br><small>${c.address}</small></td>
                    <td>${c.dni}</td>
                    <td>${c.phone}</td>
                    <td>${e.brand} (${e.btu})</td>
                    <td class="fw-bold ${isV ? 'text-danger' : 'text-success'}">${nextV.toLocaleDateString()}</td>
                    <td><button class="btn btn-sm btn-primary" onclick="openM('${id}')">Ficha</button></td>
                </tr>`;
            }
        });

        window.openM = (id) => {
            curId = id;
            onValue(ref(db, 'clientes/'+id), (s) => {
                const v = s.val();
                document.getElementById('viewObs').innerText = v.equipment.obs || "Sin obs.";
                document.getElementById('eName').value = v.client.name;
                document.getElementById('eDni').value = v.client.dni;
                document.getElementById('ePhone').value = v.client.phone;
                document.getElementById('eDist').value = v.client.district;
                document.getElementById('eAddr').value = v.client.address;
                document.getElementById('eMaps').value = v.client.maps;
                document.getElementById('eObsEdit').value = v.equipment.obs;
                const hList = document.getElementById('histList');
                hList.innerHTML = v.history ? Object.values(v.history).reverse().map(h => `<div>• ${h.date}: ${h.desc}</div>`).join('') : 'No hay visitas.';
                new bootstrap.Modal(document.getElementById('hvacModal')).show();
            }, {onlyOnce: true});
        };

        document.getElementById('btnAddHist').onclick = () => {
            const date = document.getElementById('hDate').value;
            const desc = document.getElementById('hDesc').value;
            if(date && desc) push(ref(db, `clientes/${curId}/history`), {date, desc}).then(()=>location.reload());
        };

        document.getElementById('btnUpdate').onclick = () => {
            const up = {};
            up[`clientes/${curId}/client/name`] = document.getElementById('eName').value;
            up[`clientes/${curId}/client/dni`] = document.getElementById('eDni').value;
            up[`clientes/${curId}/client/phone`] = document.getElementById('ePhone').value;
            up[`clientes/${curId}/client/address`] = document.getElementById('eAddr').value;
            up[`clientes/${curId}/client/maps`] = document.getElementById('eMaps').value;
            up[`clientes/${curId}/equipment/obs`] = document.getElementById('eObsEdit').value;
            update(ref(db), up).then(() => location.reload());
        };

        window.filtrar = () => {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.data-row').forEach(r => r.style.display = r.dataset.s.includes(q) ? '' : 'none');
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
